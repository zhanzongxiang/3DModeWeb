server:
  port: 8080

spring:
  application:
    name: model-hub-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:model_hub}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:7200}
  auth:
    expose-verification-code: ${AUTH_EXPOSE_VERIFICATION_CODE:true}
  oss:
    endpoint: ${OSS_ENDPOINT:http://127.0.0.1:9000}
    region: ${OSS_REGION:us-east-1}
    access-key: ${OSS_ACCESS_KEY:minioadmin}
    secret-key: ${OSS_SECRET_KEY:minioadmin}
    bucket: ${OSS_BUCKET:model-hub}
    public-base-url: ${OSS_PUBLIC_BASE_URL:http://127.0.0.1:9000/model-hub}
    webp-query: ${OSS_WEBP_QUERY:}
  turnstile:
    enabled: ${TURNSTILE_ENABLED:false}
    secret-key: ${TURNSTILE_SECRET_KEY:}
    verify-url: ${TURNSTILE_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}
