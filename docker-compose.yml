version: "3.9"
services:
  mysql:
    image: mysql:8.4
    container_name: modelhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: model_hub
    ports:
      - "3306:3306"
    volumes:
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: modelhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: modelhub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: modelhub-backend
    depends_on:
      - mysql
      - redis
      - minio
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: model_hub
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OSS_ENDPOINT: http://minio:9000
      OSS_REGION: us-east-1
      OSS_ACCESS_KEY: minioadmin
      OSS_SECRET_KEY: minioadmin
      OSS_BUCKET: model-hub
      OSS_PUBLIC_BASE_URL: http://localhost:9000/model-hub
      JWT_SECRET: change-this-to-a-long-random-secret-at-least-32-bytes
      JWT_EXPIRATION_SECONDS: 7200
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: modelhub-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:
  minio_data:
